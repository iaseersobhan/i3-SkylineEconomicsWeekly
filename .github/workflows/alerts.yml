name: Weekly Policy Alerts
on:
  schedule:
   - cron: '0 7 * * 1-5'
  workflow_dispatch:
jobs:
  scrape-and-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run alert scraper
        run: node scripts/scrape-and-alert.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALERTS_WORKER_URL: ${{ secrets.ALERTS_WORKER_URL }}
          ALERTS_SECRET: ${{ secrets.ALERTS_SECRET }}
